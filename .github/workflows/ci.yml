name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        pytest-version: ["8", "9"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]" "pytest~=${{ matrix.pytest-version }}.0"
      - run: python -m pytest
      - run: python -m ruff check .
      - run: python -m build
      - name: Test installed package
        run: |
          consumer="$RUNNER_TEMP/bdd-pytest-consumer"
          python -m venv "$consumer"
          "$consumer/bin/python" -m pip install dist/*.whl
          cp tests/package_smoke/installed_test.py "$RUNNER_TEMP/test_bdd_pytest_installed.py"
          cd "$RUNNER_TEMP"
          "$consumer/bin/python" -m pytest test_bdd_pytest_installed.py \
            --bdd-level-policy=error --bdd-documentation-policy=error

  cross-harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/checkout@v7
        with:
          repository: adelost/bdd-vitest
          ref: main
          path: .cross/bdd-vitest
      - uses: pnpm/action-setup@v6
        with:
          version: 10.28.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: .cross/bdd-vitest/pnpm-lock.yaml
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - run: pnpm install --frozen-lockfile
        working-directory: .cross/bdd-vitest
      - run: echo "BDD_PYTEST_PYTHON=$(python -c 'import sys; print(sys.executable)')" >> "$GITHUB_ENV"
      - run: pnpm test:cross-harness
        working-directory: .cross/bdd-vitest
        env:
          BDD_PYTEST_ROOT: ${{ github.workspace }}
